; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c6-devkitm-1]
platform = espressif32
board = esp32-c6-devkitm-1
framework = arduino
; NimBLE + WiFi needs more than default ~1.25MB app partition
board_build.partitions = huge_app.csv
lib_deps = h2zero/NimBLE-Arduino@^2.3.6
; Prebuilt Arduino esp32c6 sdkconfig enables CONFIG_ZB_ENABLED; match Arduino IDE ZigbeeMode=ed link line.
; (esp32-c6-devkitm-1-zigbee uses -DZIGBEE_MODE_ED instead — do not duplicate these -l flags there.)
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -lesp_zb_api.ed
    -lzboss_stack.ed
    -lzboss_port.native

; Zigbee stack needs dedicated partition table and ZIGBEE_MODE_ED (see lib/ZigbeeController/ZigbeeController.h).
; Build with: pio run -e esp32-c6-devkitm-1-zigbee
[env:esp32-c6-devkitm-1-zigbee]
extends = env:esp32-c6-devkitm-1
board_build.partitions = partitions/zigbee.csv
board_build.filesystem = spiffs
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; Same three libs as Arduino IDE ZigbeeMode=ed (boards.txt); avoid -DZIGBEE_MODE_ED here — it triggers a bad -libzboss_port.remote link flag on this PlatformIO toolchain.
    -lesp_zb_api.ed
    -lzboss_stack.ed
    -lzboss_port.native
    -D ENABLE_ZIGBEE=1